name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Extract version
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          set -euo pipefail

          mkdir -p dist

          VERSION="${{ steps.version.outputs.VERSION }}"

          build() {
            local name="$1"
            local main="$2"
            local os="$3"
            local arch="$4"
            local ext="$5"

            local archive_os="$os"

            if [ "$os" = "darwin" ]; then
              archive_os="macos"
            fi

            local binary="${name}${ext}"

            GOOS="$os" GOARCH="$arch" \
              go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "$binary" \
              "$main"

            if [ "$os" = "windows" ]; then

              zip \
                "dist/${name}-${VERSION}-${archive_os}-${arch}.zip" \
                "$binary"

            else

              tar -czf \
                "dist/${name}-${VERSION}-${archive_os}-${arch}.tar.gz" \
                "$binary"

            fi

            rm "$binary"
          }

          #
          # CLI
          #
          build smp ./cmd/main.go linux amd64 ""
          build smp ./cmd/main.go windows amd64 ".exe"
          build smp ./cmd/main.go darwin amd64 ""
          build smp ./cmd/main.go darwin arm64 ""

          #
          # TUI
          #
          build smp-tui ./cmd/tui/main.go linux amd64 ""
          build smp-tui ./cmd/tui/main.go windows amd64 ".exe"
          build smp-tui ./cmd/tui/main.go darwin amd64 ""
          build smp-tui ./cmd/tui/main.go darwin arm64 ""

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
